<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1e3d"/>
      <stop offset="100%" stop-color="#05060f"/>
    </linearGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="40" cy="30" r="1.5"/>
    <circle cx="120" cy="70" r="1"/>
    <circle cx="220" cy="20" r="1.2"/>
    <circle cx="300" cy="90" r="1.5"/>
    <circle cx="380" cy="40" r="1"/>
    <circle cx="460" cy="15" r="1.3"/>
    <circle cx="540" cy="60" r="1"/>
    <circle cx="620" cy="25" r="1.4"/>
    <circle cx="700" cy="80" r="1"/>
    <circle cx="760" cy="35" r="1.2"/>
    <circle cx="90" cy="130" r="1"/>
    <circle cx="260" cy="150" r="1.2"/>
    <circle cx="500" cy="120" r="1"/>
    <circle cx="650" cy="140" r="1.3"/>
  </g>

  <!-- header bar -->
  <rect x="0" y="0" width="800" height="60" fill="#14162b" opacity="0.9"/>
  <text x="30" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#f0f0f5" font-weight="600">
    🚀 NASA Picture of the Day
  </text>

  <!-- form -->
  <rect x="200" y="90" width="400" height="50" rx="10" fill="#14162b" stroke="#2e335c"/>
  <rect x="220" y="105" width="160" height="20" rx="5" fill="#1e2140" stroke="#3a3f70"/>
  <text x="230" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#aaaaaa">2024-06-01</text>
  <rect x="400" y="105" width="80" height="20" rx="5" fill="#5865f2"/>
  <text x="415" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">Search</text>

  <!-- image container -->
  <rect x="150" y="165" width="500" height="200" rx="10" fill="#000000" stroke="#2e335c"/>
  <circle cx="400" cy="230" r="35" fill="url(#star)"/>
  <circle cx="400" cy="230" r="18" fill="#ffd27a"/>
  <text x="400" y="285" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9aa5ff" font-weight="600">
    Astronomy Picture Title
  </text>
  <text x="400" y="305" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#aaaaaa">
    2024-06-01
  </text>
  <line x1="180" y1="325" x2="620" y2="325" stroke="#2e335c"/>
  <line x1="180" y1="340" x2="580" y2="340" stroke="#2e335c"/>
  <line x1="180" y1="355" x2="600" y2="355" stroke="#2e335c"/>

  <!-- history list -->
  <text x="150" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9aa5ff" font-weight="600">
    Search History
  </text>
  <rect x="150" y="405" width="150" height="0" fill="none"/>
</svg>
